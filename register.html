<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | Orbit Tasks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="config.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body class="auth-page">
    <main class="auth-shell">
        <section class="hero-panel">
            <p class="eyebrow">New Here</p>
            <h1>Build momentum fast.</h1>
            <p class="hero-copy">Create your account and turn your rough to-do list into clean weekly wins.</p>
        </section>

        <section class="form-panel">
            <div class="card">
                <h2>Create Account</h2>
                <p class="subtext">Start with your name, email, and a secure password.</p>

                <form id="registerForm" novalidate>
                    <label for="registerName">Full Name</label>
                    <input id="registerName" name="name" type="text" placeholder="Alex Rivera" required>

                    <label for="registerEmail">Email</label>
                    <input id="registerEmail" name="email" type="email" placeholder="you@example.com" required>

                    <label for="registerPassword">Password</label>
                    <input id="registerPassword" name="password" type="password" placeholder="At least 8 characters" required>

                    <label for="registerConfirmPassword">Confirm Password</label>
                    <input id="registerConfirmPassword" name="confirmPassword" type="password" placeholder="Re-enter password" required>

                    <button type="submit">Create Account</button>
                    <p id="registerMessage" class="status" aria-live="polite"></p>
                </form>

                <p class="switch-link">Already registered? <a href="login.html">Sign in</a></p>
            </div>
        </section>
    </main>
</body>
</html>
