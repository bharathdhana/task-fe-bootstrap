<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Tasks | Orbit Tasks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
     <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="config.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body class="bg-light">
    <main class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9">
                <header class="card border-0 shadow-sm mb-4">
                    <div class="card-body d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
                        <div>
                            <p class="text-uppercase small fw-semibold text-primary mb-1">Daily Dashboard</p>
                            <h1 class="h3 mb-1">Orbit Tasks</h1>
                            <p id="welcomeUser" class="text-muted mb-0"></p>
                        </div>
                        <button id="logoutBtn" class="btn btn-outline-danger btn-sm" type="button">Logout</button>
                    </div>
                </header>

                <section class="card border-0 shadow-sm mb-4">
                    <div class="card-body">
                        <h2 class="h5 mb-3">Add New Task</h2>
                        <form id="taskForm" class="row g-2" novalidate>
                            <div class="col-12 col-md-4">
                                <input id="taskTitle" name="title" type="text" class="form-control" placeholder="Write documentation draft" required>
                            </div>
                            <div class="col-12 col-md-4">
                                <input id="taskDescription" name="description" type="text" class="form-control" placeholder="Add short description" required>
                            </div>
                            <div class="col-8 col-md-2">
                                <select id="taskStatus" name="status" class="form-select" aria-label="Status">
                                    <option value="PENDING" selected>Pending</option>
                                    <option value="IN_PROGRESS">In Progress</option>
                                    <option value="COMPLETED">Completed</option>
                                </select>
                            </div>
                            <div class="col-4 col-md-2 d-grid">
                                <button type="submit" class="btn btn-primary">Add Task</button>
                            </div>
                        </form>
                        <p id="taskMessage" class="small mt-3 mb-0" aria-live="polite"></p>
                    </div>
                </section>

                <section class="card border-0 shadow-sm">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h2 class="h5 mb-0">My Items</h2>
                            <p id="taskCounter" class="text-muted small mb-0"></p>
                        </div>
                        <ul id="taskList" class="list-group"></ul>
                    </div>
                </section>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
