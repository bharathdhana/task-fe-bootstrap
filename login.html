<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Orbit Tasks</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:wght@400;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="config.js" defer></script>
    <script src="script.js" defer></script>
</head>
<body class="bg-light">
    <main class="container py-4 py-md-5">
        <div class="row justify-content-center">
            <div class="col-12 col-lg-9 col-xl-8">
                <div class="card border-0 shadow-sm overflow-hidden">
                    <div class="row g-0">
                        <section class="col-md-6 bg-primary text-white p-4 p-md-5 d-flex flex-column justify-content-center">
                            <p class="text-uppercase small fw-semibold mb-2">Focus Mode</p>
                            <h1 class="h2 fw-bold mb-3">Plan less. Finish more.</h1>
                            <p class="mb-0">Orbit Tasks keeps your daily priorities in one focused lane with zero noise.</p>
                        </section>

                        <section class="col-md-6 bg-white p-4 p-md-5">
                            <h2 class="h4 mb-2">Sign In</h2>
                            <p class="text-muted mb-4">Welcome back. Let us pick up where you left off.</p>

                            <form id="loginForm" novalidate>
                                <div class="mb-3">
                                    <label for="loginEmail" class="form-label">Email</label>
                                    <input id="loginEmail" name="email" type="email" class="form-control" placeholder="you@example.com" required>
                                </div>

                                <div class="mb-3">
                                    <label for="loginPassword" class="form-label">Password</label>
                                    <input id="loginPassword" name="password" type="password" class="form-control" placeholder="Enter password" required>
                                </div>

                                <button type="submit" class="btn btn-primary w-100">Login</button>
                                <p id="loginMessage" class="small text-center mt-3 mb-0" aria-live="polite"></p>
                            </form>

                            <p class="text-center small mt-4 mb-0">No account yet? <a href="register.html">Create one</a></p>
                        </section>
                    </div>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
